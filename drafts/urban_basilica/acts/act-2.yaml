act:
  id: act-2
  title: The Patron
  purpose: Urban enters Mehmed's world, where resources and ambition are abundant but moral distance collapses.
  sequences:
    - id: seq-003
      title: The Sultan Who Understands Scale
      purpose: Urban sells the same vision to a ruler with resources and a political imagination for artillery.
      scenes:
        - id: scene-004
          title: Four Times the Price
          scene_heading:
            raw: INT. EDIRNE PALACE WORKROOM - NIGHT
            type: standard
            location_id: loc-004
            interior_exterior: INT
            time_of_day: NIGHT
          story_function:
            - first turn
            - new patron
          blocks:
            - id: block-039
              type: scene_heading
              text: INT. EDIRNE PALACE WORKROOM - NIGHT
            - id: block-040
              type: action
              text: The same drawing lies under better lamps. MEHMED II circles it like a hunter circling tracks.
            - id: block-041
              type: dialogue
              character: MEHMED
              extension: null
              parenthetical: null
              lines:
                - Can it break the walls of Constantinople?
            - id: block-042
              type: dialogue
              character: URBAN
              extension: null
              parenthetical: null
              lines:
                - No cannon breaks a wall by itself.
                - It breaks one stone. Then another. Then the sleep of the men repairing them.
            - id: block-043
              type: dialogue
              character: MEHMED
              extension: null
              parenthetical: pleased
              lines:
                - So it is a weapon against time.
            - id: block-044
              type: dialogue
              character: URBAN
              extension: null
              parenthetical: null
              lines:
                - Against time, pride, and mortar.
            - id: block-045
              type: action
              text: Mehmed gestures. A scribe opens a chest. Coinlight spills across Urban's design.
            - id: block-046
              type: dialogue
              character: MEHMED
              extension: null
              parenthetical: null
              lines:
                - You asked the Romans for a price.
                - I will pay four.
            - id: block-047
              type: dialogue
              character: URBAN
              extension: null
              parenthetical: null
              lines:
                - And the bronze?
            - id: block-048
              type: dialogue
              character: MEHMED
              extension: null
              parenthetical: null
              lines:
                - My empire has bells enough to become thunder.
            - id: block-049
              type: action
              text: Mara watches Urban's face. The answer is visible before he speaks.
    - id: seq-004
      title: Bronze Remembers
      purpose: Make the engineering difficulty dramatic and human.
      scenes:
        - id: scene-005
          title: The Casting
          scene_heading:
            raw: INT. EDIRNE FOUNDRY - NIGHT
            type: standard
            location_id: loc-004
            interior_exterior: INT
            time_of_day: NIGHT
          story_function:
            - craft ordeal
            - midpoint build
          blocks:
            - id: block-050
              type: scene_heading
              text: INT. EDIRNE FOUNDRY - NIGHT
            - id: block-051
              type: action
              text: Bellows roar. Men feed charcoal until the air itself seems flammable.
            - id: block-126
              type: dialogue
              character: NARRATOR
              extension: V.O.
              parenthetical: null
              lines:
                - A cannon of this scale was not simply built. It was persuaded into being.
                - Metal, timber, powder, animals, wages, weather, and fear all had to obey at once.
            - id: block-052
              type: action
              text: SARUCA taps the clay mold, listening. Urban waits beside him, sleepless and radiant.
            - id: block-053
              type: dialogue
              character: SARUCA
              extension: null
              parenthetical: null
              lines:
                - Too much pride in one barrel.
            - id: block-054
              type: dialogue
              character: URBAN
              extension: null
              parenthetical: null
              lines:
                - It is measured.
            - id: block-055
              type: dialogue
              character: SARUCA
              extension: null
              parenthetical: null
              lines:
                - So is a grave.
            - id: block-056
              type: action
              text: The pour begins. Molten bronze runs through channels like a controlled catastrophe.
            - id: block-057
              type: action
              text: A worker slips. Mara catches his belt before he pitches forward into the glow.
            - id: block-058
              type: dialogue
              character: MARA
              extension: null
              parenthetical: to Urban
              lines:
                - Look at him.
            - id: block-059
              type: action
              text: Urban does. The worker's face is young, terrified, alive by inches.
            - id: block-060
              type: dialogue
              character: URBAN
              extension: null
              parenthetical: null
              lines:
                - Back to the bellows.
            - id: block-061
              type: action
              text: Mara's disappointment hurts more because she expected it.
        - id: scene-006
          title: The Test
          scene_heading:
            raw: EXT. EDIRNE TEST FIELD - DAY
            type: standard
            location_id: loc-004
            interior_exterior: EXT
            time_of_day: DAY
          story_function:
            - midpoint
            - proof
          blocks:
            - id: block-062
              type: scene_heading
              text: EXT. EDIRNE TEST FIELD - DAY
            - id: block-063
              type: action
              text: A stone ball sits inside the cannon's mouth. Beyond it, a target wall waits in an empty field.
            - id: block-064
              type: dialogue
              character: SARUCA
              extension: null
              parenthetical: null
              lines:
                - If it bursts, no one will hear your apology.
            - id: block-065
              type: dialogue
              character: URBAN
              extension: null
              parenthetical: null
              lines:
                - Then stand farther away.
            - id: block-066
              type: action
              text: Mehmed lifts one hand. Silence rolls outward through the field.
            - id: block-067
              type: action
              text: Fire. The shot tears across the air and punches the target wall open.
            - id: block-068
              type: action
              text: For a moment no one cheers. The sound has made celebration feel small.
            - id: block-069
              type: dialogue
              character: MEHMED
              extension: null
              parenthetical: softly, to Urban
              lines:
                - The city will hear this before it sees me.
            - id: block-070
              type: action
              text: Urban smiles, but it leaves him quickly.
        - id: scene-007
          title: The Road
          scene_heading:
            raw: EXT. ROAD TO CONSTANTINOPLE - DAY
            type: standard
            location_id: loc-005
            interior_exterior: EXT
            time_of_day: DAY
          story_function:
            - logistical ordeal
            - reversal
          blocks:
            - id: block-071
              type: scene_heading
              text: EXT. ROAD TO CONSTANTINOPLE - DAY
            - id: block-072
              type: action
              text: Dozens of oxen strain against ropes. Hundreds of men lever the huge bombard through mud.
            - id: block-127
              type: dialogue
              character: NARRATOR
              extension: V.O.
              parenthetical: null
              lines:
                - The great gun was cast far from the walls it was meant to break.
                - >
                  Moving it became its own siege: road against weight, mud against ambition.
            - id: block-073
              type: action
              text: The gun moves less like a weapon than a captive tower.
            - id: block-074
              type: dialogue
              character: MARA
              extension: null
              parenthetical: null
              lines:
                - It takes an army to move your idea.
            - id: block-075
              type: dialogue
              character: URBAN
              extension: null
              parenthetical: null
              lines:
                - That is why emperors ignored it.
            - id: block-076
              type: action
              text: A rope snaps. Men scatter. One ox falls screaming beneath the carriage.
            - id: block-077
              type: action
              text: The cannon does not care. It simply waits to be moved again.
            - id: block-078
              type: dialogue
              character: MARA
              extension: null
              parenthetical: null
              lines:
                - How many dead before it fires?
            - id: block-079
              type: dialogue
              character: URBAN
              extension: null
              parenthetical: null
              lines:
                - Less than after.
            - id: block-080
              type: action
              text: He regrets saying it. He does not take it back.
