project:
  title: Basilica
  intended_audience: mature adults
  target_length:
    label: 10-minute short film
    estimated_pages: 10
    estimated_minutes: 10
  genre:
    primary: historical drama
    secondary:
      - war drama
      - character tragedy
  tone:
    - grave
    - intimate
    - morally uneasy
    - political
  content_notes:
    rating_intent: mature adults
    boundaries:
      - Siege violence is present but not graphically dwelled on.
      - Religious and political tensions are treated as historical pressures, not caricature.
      - Urban's final moments are dramatized from disputed historical tradition.
  logline: >
    In the last winter of Byzantium, a Hungarian cannon founder rejected by a bankrupt emperor sells his
    terrible invention to a young Ottoman sultan and must watch his genius become the sound that ends
    a thousand-year empire.
  summary: >
    The film opens at the bombardment of Constantinople in April 1453, then cuts back to Urban arriving
    in the dying Byzantine capital with a proposition: fund his great cannon and the city may still frighten
    its enemies. Emperor Constantine XI and Loukas Notaras recognize the danger and value of the offer
    but cannot pay him, nor can they source the bronze, powder, labor, and transport needed. Urban crosses
    to Mehmed II, who understands not only the weapon but the theater of power it creates. As the gun
    is cast, hauled, tested, and finally fired at the Theodosian Walls, Urban's practical hunger for patronage
    curdles into recognition: no master truly owns a weapon once history wants to use it. The final scene
    follows the disputed tradition that Urban dies when one of his own great bombards bursts, leaving
    his last sight fixed on the walls he taught the world how to break.
  premise_overview: >
    Urban is treated as a talented foreign specialist from Brasso in the Kingdom of Hungary. The short
    compresses events from late 1452 through the 1453 siege into a chamber tragedy about money, craft,
    ambition, and responsibility.
  central_conflict: >
    Urban wants a patron who can pay for the cannon he knows he can build. Constantine wants to save a
    city with empty coffers and too few soldiers. Mehmed wants to make the impossible fall not merely
    possible but inevitable.
  dramatic_question: When survival, ambition, and invention collide, can Urban still claim he is only
    a craftsman?
  themes:
    - Technology does not stay neutral once power buys it.
    - Empires can die from poverty before they die from assault.
    - The maker's pride and the maker's guilt may be the same flame.
    - A wall built for one age can become a monument to another.
  historical_basis:
    - Urban is traditionally described as a Hungarian or Transylvanian cannon founder who offered services
      to Byzantium before serving Mehmed II.
    - Constantine XI could not meet Urban's price or provide the materials for such large artillery.
    - Mehmed II used large artillery, including the famous bombard often called Basilica, against Constantinople
      in 1453.
    - The great cannon was difficult to move, slow to reload, inaccurate, and dangerous to operate.
    - Urban's death is not securely documented; many retellings use the tradition that he was killed when
      a gun exploded.
  dramatized_elements:
    - Urban's private conversations with Constantine, Notaras, Mehmed, Saruca, and a fictional apprentice
      are invented.
    - The exact timing of Urban's death is shaped for the final image of the short.
    - Mara, Urban's apprentice, is fictional and serves as his conscience, audience surrogate, and craft
      partner.
  story_arc:
    structure_model: three_act
    acts:
      - id: act-1
        title: The Offer
        purpose: Open on the siege, then rewind to Urban's failed attempt to sell his work to Byzantium.
        estimated_pages: 1-3
        key_beats:
          - id: beat-001
            type: hook
            label: The walls shake under Urban's cannon.
            description: The audience first meets Urban through the destructive consequence of his work.
          - id: beat-002
            type: setup
            label: Urban brings his design to Constantine XI.
            description: He believes the Byzantines will understand the need for a weapon equal to the
              age.
          - id: beat-003
            type: inciting_incident
            label: Byzantium cannot pay.
            description: Constantine and Notaras reject Urban not out of ignorance, but because their
              empire is already starved.
      - id: act-2
        title: The Patron
        purpose: Urban enters Mehmed's world, where resources and ambition are abundant but moral distance
          collapses.
        estimated_pages: 4-8
        key_beats:
          - id: beat-004
            type: first_turn
            label: Urban crosses to Edirne.
            description: He offers Mehmed a cannon large enough to batter the walls that have resisted
              centuries.
          - id: beat-005
            type: midpoint
            label: The test shot succeeds.
            description: Urban earns his patron and loses his plausible innocence.
          - id: beat-006
            type: reversal
            label: The gun's hunger becomes visible.
            description: The massive bombard consumes men, animals, metal, powder, and time while threatening
              its own crew.
      - id: act-3
        title: The Sound
        purpose: Return to the siege and force Urban to face the human meaning of his craft.
        estimated_pages: 9-10
        key_beats:
          - id: beat-007
            type: low_point
            label: The breach opens.
            description: Urban sees the walls crumble and realizes the cannon has become more powerful
              than his intention.
          - id: beat-008
            type: climax
            label: The bombard bursts.
            description: Urban tries to correct a dangerous firing under pressure; the weapon destroys
              its maker.
          - id: beat-009
            type: resolution
            label: The city still waits for the next shot.
            description: Urban dies before the fall, leaving history to remember the weapon more clearly
              than the man.
revision_state:
  status: initial_draft
  research_sources:
    - label: Britannica, Fall of Constantinople
      url: https://www.britannica.com/event/Fall-of-Constantinople-1453
      relevant_points:
        - Mehmed tasked Hungarian gunsmith Urban with arming Rumelihisari and building cannon powerful
          enough for Constantinople's walls.
        - By March 1453 Urban's cannon was transported from Edirne to Constantinople.
        - Constantine XI sought aid; Genoese commander Giovanni Giustiniani arrived with 700 soldiers.
    - label: World History Encyclopedia - 1453 The Fall of Constantinople
      url: https://www.worldhistory.org/article/1180/1453-the-fall-of-constantinople/
      relevant_points:
        - Urban first offered the cannon to the Byzantines, but Constantine could not meet his price.
        - Mehmed offered far more and used large artillery in the siege.
        - The largest cannon was slow to cool and reload, while defenders repaired breaches at night.
    - label: Oxford Cabinet, Fall of Constantinople 1453
      url: https://www.cabinet.ox.ac.uk/fall-constantinople-1453
      relevant_points:
        - The largest bombard is traditionally attributed to Urban and called Basilica.
        - It required a large team of oxen and men to move, was slow to reload, and could damage walls
          despite inaccuracy.
    - label: Fracture and Structural Integrity, Damage and failure of Urban's gun
      url: https://www.fracturae.com/index.php/fis/article/view/2615
      relevant_points:
        - Modern technical analysis treats historical reports of damage and possible failure of Urban's
          gun as plausible engineering problems.
    - label: Britannica, Constantine XI Palaeologus
      url: https://www.britannica.com/biography/Constantine-XI-Palaeologus
      relevant_points:
        - Constantine XI was killed in the final defense of Constantinople on May 29, 1453.
  assumptions_made:
    - Urban is portrayed as a mature craftsman in his forties; his exact age is unknown.
    - Mara is fictional, added to externalize Urban's conscience and provide a practical foundry relationship.
    - Saruca is used as an Ottoman master founder based on historical references to Ottoman artillery
      specialists; his direct relationship with Urban is dramatized.
    - Urban's death by cannon explosion is used as the final scene because it is a strong tradition, but
      the script openly marks it as uncertain.
    - The story compresses late 1452 through the April-May 1453 siege for a 10-minute short.
    - A narrator has been added for selected historical grounding, especially where context deepens the
      audience's understanding without needing extra scenes.
  open_questions:
    - Should the next draft make Urban more sympathetic, more mercenary, or more morally divided from
      the start?
    - Do you want the final film to end before the city's fall, as drafted, or include a brief image from
      May 29, 1453?
    - Should Mara remain fictional, or should the conscience role be transferred to a historically plausible
      but unnamed foundry worker?
    - Do you prefer a more multilingual texture with Greek, Hungarian, Italian, and Ottoman Turkish phrases
      noted in dialogue?
  next_iteration_options:
    - Expand this into a full 10-page dialogue-polished draft with tighter scene timing.
    - Create a historically annotated version that marks each beat as documented, inferred, or invented.
    - Make it more cinematic and sparse, with less dialogue and more visual storytelling around the casting
      and siege.
    - Prepare a shot list and production design notes for a low-budget short.
