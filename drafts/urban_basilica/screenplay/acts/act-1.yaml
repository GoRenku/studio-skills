id: act-1
title: The Offer
purpose: Open on the siege, then rewind to Urban's failed attempt to sell his work to Byzantium.
sequences:
  - id: seq-001
    title: The Sound That Opens Stone
    purpose: Begin with the siege consequence before rewinding to the bargain.
    scenes:
      - id: scene-001
        title: Bombardment
        scene_setting:
          interior_exterior: EXT
          location_ids:
            - theodosian-walls
          time_of_day: DAWN
        story_function:
          - hook
          - future consequence
        blocks:
          - id: block-002
            type: action
            text: A gray April dawn. @theodosian-walls rise from smoke like a cliff at the edge of the
              world.
          - id: block-122
            type: dialogue
            cast_id: narrator
            extension: V.O.
            lines:
              - For a thousand years, these walls had taught armies to turn back.
              - In the spring of 1453, a new lesson arrived on wheels.
          - id: block-003
            type: action
            text: In the Ottoman lines, a bronze mouth big enough for a man to crawl inside points at
              the city.
          - id: block-004
            type: action
            text: '@urban stands beside it, face blackened, one hand on the warm metal as if taking a
              pulse.'
          - id: block-005
            type: dialogue
            cast_id: mara
            parenthetical: low
            lines:
              - The barrel is still angry.
          - id: block-006
            type: dialogue
            cast_id: urban
            lines:
              - Bronze has no temper. Men give it one.
          - id: block-007
            type: action
            text: Crews wedge the great stone ball into place. Men cover their ears before the order is
              even given.
          - id: block-008
            type: dialogue
            cast_id: mehmed-ii
            extension: O.S.
            lines:
              - Fire.
          - id: block-009
            type: action
            text: The cannon erupts. The world becomes flame, thunder, and flying dust.
          - id: block-010
            type: shot
            text: >
              ON @theodosian-walls: stone cracks. Defenders vanish inside a white cloud.
          - id: block-123
            type: dialogue
            cast_id: narrator
            extension: V.O.
            lines:
              - The maker of this thunder was not Ottoman. He had come first to the men inside the city.
          - id: block-011
            type: action
            text: '@urban watches the smoke strike the city before the ball does.'
          - id: block-012
            type: transition
            text: CUT TO BLACK.
          - id: block-013
            type: title_card
            text: FOUR MONTHS EARLIER
  - id: seq-002
    title: The Emperor Without Coin
    purpose: Show Urban's Byzantine offer and the material reasons for rejection.
    scenes:
      - id: scene-002
        title: The First Patron
        scene_setting:
          interior_exterior: INT
          location_ids:
            - imperial-council-chamber
          time_of_day: DAY
        story_function:
          - setup
          - failed offer
        blocks:
          - id: block-015
            type: action
            text: '@urban unrolls a charcoal drawing across a table scarred by generations of decisions.'
          - id: block-016
            type: action
            text: '@constantine-xi-palaiologos studies the design. @loukas-notaras studies the numbers
              beside it.'
          - id: block-124
            type: dialogue
            cast_id: narrator
            extension: V.O.
            lines:
              - By then, Byzantium was less an empire than a magnificent city with debts, memories, and
                enemies.
              - Constantine could recognize genius. Recognition was cheaper than bronze.
          - id: block-017
            type: dialogue
            cast_id: urban
            lines:
              - A gun this size does not defend a wall. It changes the mind of the man approaching it.
          - id: block-018
            type: dialogue
            cast_id: loukas-notaras
            lines:
              - It changes the mind of the treasurer first.
          - id: block-019
            type: dialogue
            cast_id: constantine-xi-palaiologos
            lines:
              - What would you require?
          - id: block-020
            type: dialogue
            cast_id: urban
            lines:
              - Bronze. Powder. Charcoal. Masons. Carpenters. Oxen. A foundry that can breathe without
                collapsing.
              - And pay enough that my men do not sell the design before the mold dries.
          - id: block-021
            type: action
            text: '@loukas-notaras slides a small tray of coins into view. It is almost embarrassing.'
          - id: block-022
            type: dialogue
            cast_id: loukas-notaras
            lines:
              - This is what the empire can breathe.
          - id: block-023
            type: dialogue
            cast_id: urban
            lines:
              - Then the empire is suffocating.
          - id: block-024
            type: action
            text: The insult lands. @constantine-xi-palaiologos absorbs it without flinching.
          - id: block-025
            type: dialogue
            cast_id: constantine-xi-palaiologos
            lines:
              - Yes.
              - But it is still my city.
          - id: block-026
            type: dialogue
            cast_id: urban
            lines:
              - Then buy what may keep it yours.
          - id: block-027
            type: dialogue
            cast_id: constantine-xi-palaiologos
            lines:
              - Master Urban, I cannot buy bread with prophecy, nor bronze with courage.
          - id: block-028
            type: action
            text: '@urban looks from emperor to minister. He understands too well. That makes it worse.'
          - id: block-125
            type: dialogue
            cast_id: narrator
            extension: V.O.
            lines:
              - The refusal was not blindness. It was poverty.
              - And poverty, in war, can look very much like fate.
      - id: scene-003
        title: The Harbor Argument
        scene_setting:
          interior_exterior: EXT
          location_ids:
            - harbor-quarter
          time_of_day: EVENING
        story_function:
          - moral pressure
          - choice
        blocks:
          - id: block-030
            type: action
            text: '@urban and @mara pass refugees mending nets, soldiers mending shields, monks mending
              hope.'
          - id: block-031
            type: dialogue
            cast_id: mara
            lines:
              - They are afraid of your gun.
          - id: block-032
            type: dialogue
            cast_id: urban
            lines:
              - They are afraid of the man who can afford it.
          - id: block-033
            type: dialogue
            cast_id: mara
            lines:
              - Then do not go to him.
          - id: block-034
            type: dialogue
            cast_id: urban
            lines:
              - A design unfired is a corpse with clean hands.
          - id: block-035
            type: action
            text: Across the water, Ottoman watchfires mark the dark like a second coastline.
          - id: block-036
            type: dialogue
            cast_id: mara
            lines:
              - And a design fired?
          - id: block-037
            type: action
            text: '@urban folds the drawing and tucks it under his coat.'
          - id: block-038
            type: dialogue
            cast_id: urban
            lines:
              - Work.
