id: act-2
title: The Patron
purpose: Urban enters Mehmed's world, where resources and ambition are abundant but moral distance collapses.
sequences:
  - id: seq-003
    title: The Sultan Who Understands Scale
    purpose: Urban sells the same vision to a ruler with resources and a political imagination for artillery.
    scenes:
      - id: scene-004
        title: Four Times the Price
        scene_setting:
          interior_exterior: INT
          location_ids:
            - edirne-palace-workroom
          time_of_day: NIGHT
        story_function:
          - first turn
          - new patron
        blocks:
          - id: block-040
            type: action
            text: The same drawing lies under better lamps. @mehmed-ii circles it like a hunter circling
              tracks.
          - id: block-041
            type: dialogue
            cast_id: mehmed-ii
            lines:
              - Can it break the walls of Constantinople?
          - id: block-042
            type: dialogue
            cast_id: urban
            lines:
              - No cannon breaks a wall by itself.
              - It breaks one stone. Then another. Then the sleep of the men repairing them.
          - id: block-043
            type: dialogue
            cast_id: mehmed-ii
            parenthetical: pleased
            lines:
              - So it is a weapon against time.
          - id: block-044
            type: dialogue
            cast_id: urban
            lines:
              - Against time, pride, and mortar.
          - id: block-045
            type: action
            text: '@mehmed-ii gestures. A scribe opens a chest. Coinlight spills across @urban''s design.'
          - id: block-046
            type: dialogue
            cast_id: mehmed-ii
            lines:
              - You asked the Romans for a price.
              - I will pay four.
          - id: block-047
            type: dialogue
            cast_id: urban
            lines:
              - And the bronze?
          - id: block-048
            type: dialogue
            cast_id: mehmed-ii
            lines:
              - My empire has bells enough to become thunder.
          - id: block-049
            type: action
            text: '@mara watches @urban''s face. The answer is visible before he speaks.'
  - id: seq-004
    title: Bronze Remembers
    purpose: Make the engineering difficulty dramatic and human.
    scenes:
      - id: scene-005
        title: The Casting
        scene_setting:
          interior_exterior: INT
          location_ids:
            - edirne-foundry
          time_of_day: NIGHT
        story_function:
          - craft ordeal
          - midpoint build
        blocks:
          - id: block-051
            type: action
            text: Bellows roar. Men feed charcoal until the air itself seems flammable.
          - id: block-126
            type: dialogue
            cast_id: narrator
            extension: V.O.
            lines:
              - A cannon of this scale was not simply built. It was persuaded into being.
              - Metal, timber, powder, animals, wages, weather, and fear all had to obey at once.
          - id: block-052
            type: action
            text: '@saruca taps the clay mold, listening. @urban waits beside him, sleepless and radiant.'
          - id: block-053
            type: dialogue
            cast_id: saruca
            lines:
              - Too much pride in one barrel.
          - id: block-054
            type: dialogue
            cast_id: urban
            lines:
              - It is measured.
          - id: block-055
            type: dialogue
            cast_id: saruca
            lines:
              - So is a grave.
          - id: block-056
            type: action
            text: The pour begins. Molten bronze runs through channels like a controlled catastrophe.
          - id: block-057
            type: action
            text: A worker slips. @mara catches his belt before he pitches forward into the glow.
          - id: block-058
            type: dialogue
            cast_id: mara
            parenthetical: to Urban
            lines:
              - Look at him.
          - id: block-059
            type: action
            text: '@urban does. The worker''s face is young, terrified, alive by inches.'
          - id: block-060
            type: dialogue
            cast_id: urban
            lines:
              - Back to the bellows.
          - id: block-061
            type: action
            text: '@mara''s disappointment hurts more because she expected it.'
      - id: scene-006
        title: The Test
        scene_setting:
          interior_exterior: EXT
          location_ids:
            - edirne-test-field
          time_of_day: DAY
        story_function:
          - midpoint
          - proof
        blocks:
          - id: block-063
            type: action
            text: A stone ball sits inside the cannon's mouth. Beyond it, a target wall waits in an empty
              field.
          - id: block-064
            type: dialogue
            cast_id: saruca
            lines:
              - If it bursts, no one will hear your apology.
          - id: block-065
            type: dialogue
            cast_id: urban
            lines:
              - Then stand farther away.
          - id: block-066
            type: action
            text: '@mehmed-ii lifts one hand. Silence rolls outward through the field.'
          - id: block-067
            type: action
            text: Fire. The shot tears across the air and punches the target wall open.
          - id: block-068
            type: action
            text: For a moment no one cheers. The sound has made celebration feel small.
          - id: block-069
            type: dialogue
            cast_id: mehmed-ii
            parenthetical: softly, to Urban
            lines:
              - The city will hear this before it sees me.
          - id: block-070
            type: action
            text: '@urban smiles, but it leaves him quickly.'
      - id: scene-007
        title: The Road
        scene_setting:
          interior_exterior: EXT
          location_ids:
            - road-to-constantinople
          time_of_day: DAY
        story_function:
          - logistical ordeal
          - reversal
        blocks:
          - id: block-072
            type: action
            text: Dozens of oxen strain against ropes. Hundreds of men lever the huge bombard through
              mud.
          - id: block-127
            type: dialogue
            cast_id: narrator
            extension: V.O.
            lines:
              - The great gun was cast far from the walls it was meant to break.
              - >
                Moving it became its own siege: road against weight, mud against ambition.
          - id: block-073
            type: action
            text: The gun moves less like a weapon than a captive tower.
          - id: block-074
            type: dialogue
            cast_id: mara
            lines:
              - It takes an army to move your idea.
          - id: block-075
            type: dialogue
            cast_id: urban
            lines:
              - That is why emperors ignored it.
          - id: block-076
            type: action
            text: A rope snaps. Men scatter. One ox falls screaming beneath the carriage.
          - id: block-077
            type: action
            text: The cannon does not care. It simply waits to be moved again.
          - id: block-078
            type: dialogue
            cast_id: mara
            lines:
              - How many dead before it fires?
          - id: block-079
            type: dialogue
            cast_id: urban
            lines:
              - Less than after.
          - id: block-080
            type: action
            text: He regrets saying it. He does not take it back.
